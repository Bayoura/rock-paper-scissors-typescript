<!DOCTYPE html>
<html lang="en">

<head>
    <title>Weapon Triangle Game</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Weapon Triangle Game</h1>
    </header>
    <main>
        <section class="score-board">
            <span id="user-label">User</span>
            <div class="score-container" aria-live="polite">
                <span id="user-score">0</span>:<span id="computer-score">0</span>
            </div>
            <span id="computer-label">Computer</span>
        </section>
        <div class="round-result">You win this round!</div>
        <!-- You win / Computer wins / Draw / Computer choosing ... -->
        <section class="game-container">
            <aside class="rules-container">
                <h2>Rules:</h2>
                <ul>
                    <li>Lance beats Sword.</li>
                    <li>Sword beats Axe.</li>
                    <li>Axe beats Lance.</li>
                </ul>
                <p>First to 5 wins.</p>
            </aside>
            <div class="weapon-selection-container">
                <h2>Choose your weapon!</h2>
                <ul class="weapon-container">
                    <li><img src="images/lance.png" alt="Lance" id="lance" class="weapon-img"></li>
                    <li><img src="images/sword.png" alt="Sword" id="sword" class="weapon-img"></li>
                    <li><img src="images/axe.png" alt="Axe" id="axe" class="weapon-img"></li>
                </ul>
            </div>
        </section>
    </main>
    <footer>
        <p>Created by <a href="https://github.com/Bayoura" target="_blank">Bayoura</a></p>
        <p>Image by <a
                href="https://pixabay.com/users/clker-free-vector-images-3736/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=23663"
                target="_blank">Clker-Free-Vector-Images</a>
            from <a
                href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=23663"
                target="_blank">Pixabay</a>
        </p>
        <p>
            The logos were designed at <a href="https://logomakr.com/" target="_blank">LogoMakr.com</a>.
        </p>
    </footer>

    <script type="module" src="dist/main.js"></script>
</body>

</html>
